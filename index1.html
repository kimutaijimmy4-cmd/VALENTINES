<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Naughty Me 🤭</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      text-align: center;
      color: white;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 2.5em;
    }

    p {
      font-size: 1.2em;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px;
      transition: 0.3s;
    }

    #yesBtn {
      background-color: #28a745;
      color: white;
    }

    #noBtn {
      background-color: #dc3545;
      color: white;
      position: absolute;
    }

    #response {
      margin-top: 20px;
      font-size: 1.5em;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Hey 😊</h1>
  <p>I’ve been thinking... Utanipea lini😁🫣? </p>

  <button id="KeshoBtn">Kesho ❤️</button>
  <button id="neverBtn">Never 😅</button>

  <div id="response"></div>
</div>

<script>
  const KeshoBtn = document.getElementById("KeshoBtn");
  const neverBtn = document.getElementById("neverBtn");
  const response = document.getElementById("response");

  KeshoBtn.onclick = () => {
    response.innerHTML = "You just made me the happiest person 😭❤️";
  };

  neverBtn.onmouseover = () => {
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  };
</script>

</body>
</html>
